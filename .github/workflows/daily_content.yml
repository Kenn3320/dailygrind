name: 🎨 Daily TikTok Content Generator

on:
  schedule:
    - cron: "0 1 * * *"   # Jam 08:00 WIB
  workflow_dispatch:       # Bisa trigger manual

permissions:
  contents: write

jobs:
  generate-content:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pillow numpy requests

      - name: Generate slides
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python generate_content.py

      - name: Commit & push slides to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest_slides/
          git commit -m "🎨 Daily slides $(date +'%Y-%m-%d')" || echo "No changes"
          git push
